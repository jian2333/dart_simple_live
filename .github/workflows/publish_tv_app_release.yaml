name: app-build-action
# 手动触发
on:
  workflow_dispatch:
jobs:
  build-tv:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      #签出代码
      - uses: actions/checkout@v4
        with:
          ref: master

      # 伪造空的密钥配置文件，绕过 build.gradle.kts 的非空强转检查
      - name: Create fake key.properties
        run: |
          echo "storeFile=fake_keystore.jks" > simple_live_tv_app/android/key.properties
          echo "storePassword=fake_password" >> simple_live_tv_app/android/key.properties
          echo "keyPassword=fake_password" >> simple_live_tv_app/android/key.properties
          echo "keyAlias=fake_alias" >> simple_live_tv_app/android/key.properties

      # 设置JAVA环境
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      #设置Flutter
      - name: Flutter action
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      #更新Flutter的packages
      - name: Restore packages
        run: |
          cd simple_live_tv_app
          flutter pub get

      #打包APK（Debug模式，使用本地通用调试签名）
      - name: Build APK
        run: |
          cd simple_live_tv_app
          flutter build apk --debug

      #上传APK至Artifacts
      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android_tv_debug
          path: simple_live_tv_app/build/app/outputs/flutter-apk/app-debug.apk

      #完成
      - run: echo "🍏 This job's status is ${{ job.status }}."
